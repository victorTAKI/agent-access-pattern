name: agent-access-pattern
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # Core frameworks used across the components
      - fastmcp>=2.10.0
      - strands-agents>=0.1.0
      - strands-agents-tools>=0.1.0
      - mcp>=1.9.0
      # Web / HTTP
      - fastapi>=0.115.0
      - "uvicorn[standard]>=0.30.0"
      - httpx>=0.27.0
      - requests>=2.32.0
      # OAuth / JWT
      - "pyjwt[crypto]>=2.9.0"
      # Config
      - pyyaml>=6.0.2
      - pydantic>=2.8.0
      # UI
      - streamlit>=1.38.0
      - streamlit-keycloak>=0.2.9
      # AWS
      - boto3>=1.35.0
      # Dev tools
      - ruff
      - pytest
